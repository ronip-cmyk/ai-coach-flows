<head>

<title>AI Coach — Figma Flows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#7c57fd;
    --secondary-container:#e5ddff;
    --surface:#fafafa;
    --on-surface:#3d3d3d;
    --on-surface-variant:#666666;
    --type3:#ababab;
    --heading:#2f2b56;
    --card-shadow:0 3px 12px rgba(0,0,0,.10);

  html,body{margin:0;padding:0;background:#0e0e10;min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:#fff;-webkit-font-smoothing:antialiased;}
  #root{min-height:100vh;display:flex;align-items:center;justify-content:center;gap:40px;padding:40px 20px;box-sizing:border-box;}
  body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 25% 20%,rgba(124,87,253,.20)0%,transparent 55%),#0e0e10;}
  button{font-family:inherit;cursor:pointer;}
  *{box-sizing:border-box;}
  ::-webkit-scrollbar{width:0;height:0;}
</style>
</head>

  <div id="root"></div>
